<app-page-header title="Professores" description="Gerenciar professores cadastrados no backend">
  <button
    (click)="openModal()"
    class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground shadow hover:bg-primary/90 h-9 px-4 py-2 gap-2"
  >
    <lucide-icon [img]="Plus" class="h-4 w-4"></lucide-icon> Novo Professor
  </button>
</app-page-header>

<div
  *ngIf="errorMessage()"
  class="mb-4 rounded-lg border border-destructive/30 bg-destructive/10 p-3 text-sm text-destructive"
>
  {{ errorMessage() }}
</div>

<div
  *ngIf="successMessage()"
  class="mb-4 rounded-lg border border-success/30 bg-success/10 p-3 text-sm text-success"
>
  {{ successMessage() }}
</div>

<div class="glass-card overflow-hidden">
  <div class="p-4 border-b">
    <div class="relative max-w-sm">
      <lucide-icon
        [img]="Search"
        class="absolute left-1 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground"
      ></lucide-icon>
      <input
        type="text"
        placeholder="Buscar professor..."
        [ngModel]="searchQuery()"
        (ngModelChange)="searchQuery.set($event)"
        class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-sm shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 pl-9"
      />
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr class="border-b bg-muted/50">
          <th class="text-left px-6 py-3 font-medium text-muted-foreground">Nome</th>
          <th class="text-left px-6 py-3 font-medium text-muted-foreground">Matrícula</th>
          <th class="text-left px-6 py-3 font-medium text-muted-foreground">Escola</th>
          <th class="text-left px-6 py-3 font-medium text-muted-foreground">Status</th>
          <th class="text-right px-6 py-3 font-medium text-muted-foreground">Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngIf="isLoading()">
          <td colspan="5" class="px-6 py-8 text-center text-muted-foreground">
            Carregando professores...
          </td>
        </tr>
        <tr *ngIf="!isLoading() && filteredProfessors().length === 0">
          <td colspan="5" class="px-6 py-8 text-center text-muted-foreground">
            Nenhum professor encontrado.
          </td>
        </tr>
        <tr
          *ngFor="let p of filteredProfessors()"
          class="border-b last:border-0 hover:bg-muted/30 transition-colors"
        >
          <td class="px-6 py-3 font-medium">{{ p.nome }}</td>
          <td class="px-6 py-3 text-muted-foreground">{{ p.matricula }}</td>
          <td class="px-6 py-3 text-muted-foreground">{{ p.escola }}</td>
          <td class="px-6 py-3">
            <app-status-badge [status]="p.statusProfessor"></app-status-badge>
          </td>
          <td class="px-6 py-3 text-right">
            <button
              (click)="toggleStatus(p.id, p.statusProfessor)"
              class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-8 px-3 gap-2"
            >
              <lucide-icon
                [img]="p.statusProfessor === 'ATIVO' ? ToggleRight : ToggleLeft"
                class="h-4 w-4"
              ></lucide-icon>
              {{ p.statusProfessor === 'ATIVO' ? 'Inativar' : 'Inativo' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="isModalOpen()" class="relative z-50">
  <div
    class="fixed inset-0 bg-background/80 backdrop-blur-sm transition-all"
    (click)="closeModal()"
  ></div>

  <div
    class="fixed left-[50%] top-[50%] z-50 grid w-full max-w-xl translate-x-[-50%] translate-y-[-50%] gap-4 border bg-background p-6 shadow-lg sm:rounded-lg"
  >
    <div class="flex flex-col space-y-1.5 text-center sm:text-left mb-2">
      <h2 class="text-lg font-semibold leading-none tracking-tight">Novo Professor</h2>
      <button
        (click)="closeModal()"
        class="absolute right-4 top-4 rounded-sm opacity-70 hover:opacity-100 focus:outline-none"
      >
        <lucide-icon [img]="X" class="h-4 w-4"></lucide-icon>
      </button>
    </div>

    <div
      *ngIf="errorMessage()"
      class="rounded-lg border border-destructive/30 bg-destructive/10 p-3 text-sm text-destructive"
    >
      {{ errorMessage() }}
    </div>

    <div
      *ngIf="successMessage()"
      class="rounded-lg border border-success/30 bg-success/10 p-3 text-sm text-success"
    >
      {{ successMessage() }}
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 py-2">
      <div class="space-y-2 md:col-span-2">
        <label class="text-sm font-medium leading-none"
          >Nome completo <span class="text-destructive">*</span></label
        >
        <input
          [(ngModel)]="form.nome"
          type="text"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium leading-none"
          >Matrícula <span class="text-destructive">*</span></label
        >
        <input
          [(ngModel)]="form.matricula"
          type="text"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium leading-none"
          >Escola <span class="text-destructive">*</span></label
        >
        <input
          [(ngModel)]="form.escola"
          type="text"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2 md:col-span-2">
        <label class="text-sm font-medium leading-none"
          >E-mail <span class="text-destructive">*</span></label
        >
        <input
          [(ngModel)]="form.email"
          type="email"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium leading-none">WhatsApp</label>
        <input
          [(ngModel)]="form.whatsapp"
          type="text"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium leading-none">Telefone de contato</label>
        <input
          [(ngModel)]="form.telefoneContato"
          type="text"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>

      <div class="space-y-2 md:col-span-2">
        <label class="text-sm font-medium leading-none"
          >Senha <span class="text-destructive">*</span></label
        >
        <input
          [(ngModel)]="form.senha"
          type="password"
          class="flex h-10 w-full rounded-md border border-input bg-transparent px-3 py-2 text-sm"
        />
      </div>
    </div>

    <div class="flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2 mt-2">
      <button
        (click)="closeModal()"
        class="mt-2 sm:mt-0 inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 px-4 py-2"
      >
        Cancelar
      </button>
      <button
        (click)="saveProfessor()"
        [disabled]="isSubmitting()"
        class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2"
      >
        {{ isSubmitting() ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </div>
</div>
