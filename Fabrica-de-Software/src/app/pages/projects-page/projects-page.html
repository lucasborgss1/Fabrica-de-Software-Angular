<app-page-header
  title="Meus Projetos"
  description="Projetos aprovados e em andamento"
></app-page-header>

<div *ngIf="myProjects.length === 0" class="glass-card p-12 text-center">
  <lucide-icon
    [img]="FolderKanban"
    class="h-12 w-12 text-muted-foreground mx-auto mb-3"
  ></lucide-icon>
  <p class="text-muted-foreground">Nenhum projeto ativo no momento</p>
</div>

<div *ngIf="myProjects.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-4">
  <div
    *ngFor="let p of myProjects"
    class="glass-card p-5 space-y-4 cursor-pointer hover:shadow-md transition-shadow"
    (click)="viewProject(p.id)"
  >
    <div class="flex items-start justify-between">
      <div>
        <h3 class="font-semibold">{{ p.name }}</h3>
        <p class="text-sm text-muted-foreground mt-1">{{ p.objective }}</p>
      </div>
      <app-status-badge [status]="p.status"></app-status-badge>
    </div>

    <ng-container *ngIf="getWorkgroupForProject(p.id) as group">
      <div class="flex items-center gap-2 text-sm text-muted-foreground pt-2 border-t">
        <lucide-icon [img]="Users" class="h-4 w-4"></lucide-icon>
        <span>{{ group.students.length }} alunos no grupo</span>
      </div>
    </ng-container>
  </div>
</div>
