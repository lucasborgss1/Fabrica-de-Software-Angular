<div class="min-h-screen flex items-center justify-center bg-background p-4">
  <div class="w-full max-w-md animate-fade-in">
    <div class="glass-card p-8">
      <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-primary flex items-center justify-center mb-4">
          <lucide-icon [img]="FolderKanban" class="w-7 h-7 text-primary-foreground"></lucide-icon>
        </div>
        <h1 class="text-2xl font-bold">Fábrica de Software</h1>
        <p class="text-muted-foreground text-sm mt-1">Gestão de Projetos Acadêmicos</p>
      </div>

      <form (submit)="handleLogin($event)" class="space-y-4">
        <div class="rounded-lg border border-input bg-muted/40 p-3 text-sm text-muted-foreground">
          Use seu login e sua senha do sistema.
        </div>

        <div
          *ngIf="errorMessage()"
          class="rounded-lg border border-destructive/30 bg-destructive/10 p-3 text-sm text-destructive"
        >
          {{ errorMessage() }}
        </div>

        <div class="space-y-2">
          <label for="login" class="text-sm font-medium leading-none"
            >Login <span class="text-destructive">*</span></label
          >
          <app-input
            id="login"
            type="text"
            placeholder="adm"
            [ngModel]="login()"
            (ngModelChange)="login.set($event)"
            name="login"
            className="h-11"
          />
        </div>

        <div class="space-y-2">
          <label for="password" class="text-sm font-medium leading-none"
            >Senha <span class="text-destructive">*</span></label
          >
          <div class="relative">
            <app-input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              placeholder="••••••••"
              [ngModel]="password()"
              (ngModelChange)="password.set($event)"
              name="password"
              className="h-11 pr-10"
            />
            <app-button
              type="button"
              variant="ghost"
              size="icon"
              className="absolute right-1 top-1/2 -translate-y-1/2 h-7 w-7 text-muted-foreground hover:text-foreground"
              (clicked)="togglePassword()"
            >
              <lucide-icon [img]="showPassword() ? EyeOff : Eye" class="h-4 w-4"></lucide-icon>
            </app-button>
          </div>
        </div>

        <div class="flex items-center justify-between text-sm p-2">
          <label class="flex items-center gap-2 cursor-pointer">
            <input
              type="checkbox"
              [ngModel]="rememberMe()"
              (ngModelChange)="rememberMe.set($event)"
              name="rememberMe"
              class="rounded border-input"
            />
            <span class="text-muted-foreground">Manter sessão</span>
          </label>
          <span class="text-muted-foreground">
            <a href="#">Esqueceu a senha?</a>
          </span>
        </div>

        <app-button
          type="submit"
          variant="default"
          size="lg"
          className="w-full"
          [disabled]="isLoading()"
        >
          {{ isLoading() ? 'Entrando...' : 'Entrar' }}
        </app-button>
      </form>
    </div>
  </div>
</div>
