<aside
  class="flex flex-col h-full bg-card border-r transition-all duration-300"
  [ngClass]="collapsed ? 'w-16' : 'w-64'"
>
  <div class="flex items-center gap-3 px-4 py-5 border-b h-16 shrink-0">
    <div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center shrink-0">
      <lucide-icon [img]="FolderKanban" class="w-4 h-4 text-primary-foreground"></lucide-icon>
    </div>

    <div *ngIf="!collapsed" class="flex flex-col overflow-hidden whitespace-nowrap animate-fade-in">
      <span class="text-sm font-semibold text-foreground">Fábrica de Software</span>
      <span class="text-xs text-muted-foreground">Gestão de Projetos</span>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-3 py-4 space-y-4">
    <div>
      <h4
        *ngIf="!collapsed"
        class="text-xs uppercase tracking-wider text-muted-foreground font-medium mb-2 px-2"
      >
        Menu
      </h4>

      <nav class="space-y-1">
        <a
          *ngFor="let item of currentItems"
          [routerLink]="item.url"
          routerLinkActive="bg-accent text-accent-foreground font-medium"
          [routerLinkActiveOptions]="{ exact: item.url === '/dashboard' }"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-foreground/70 transition-colors hover:bg-accent hover:text-accent-foreground group"
          [title]="collapsed ? item.title : ''"
        >
          <lucide-icon [img]="item.icon" class="h-4 w-4 shrink-0"></lucide-icon>
          <span *ngIf="!collapsed" class="truncate">{{ item.title }}</span>
        </a>
      </nav>
    </div>
  </div>

  <div class="p-3 border-t mt-auto">
    <button
      (click)="handleLogout()"
      class="flex items-center w-full gap-3 rounded-lg px-3 py-2.5 text-sm text-muted-foreground transition-colors hover:bg-destructive/10 hover:text-destructive group"
      [title]="collapsed ? 'Sair' : ''"
    >
      <lucide-icon [img]="LogOut" class="h-4 w-4 shrink-0"></lucide-icon>
      <span *ngIf="!collapsed">Sair</span>
    </button>
  </div>
</aside>
