<aside
  class="flex flex-col h-full bg-[#0f2a4a] border-r border-[#1a3a60] transition-all duration-300 text-gray-100"
  [ngClass]="collapsed ? 'w-16' : 'w-64'"
>
  <div class="flex items-center gap-3 px-4 py-5 border-b border-[#1a3a60] h-16 shrink-0">
    <div
      class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center shrink-0 transition-colors duration-300 ease-in-out"
    >
      <lucide-icon
        [img]="FolderKanban"
        class="w-4 h-4 text-white transition-colors duration-300"
      ></lucide-icon>
    </div>

    <div *ngIf="!collapsed" class="flex flex-col overflow-hidden whitespace-nowrap animate-fade-in">
      <span class="text-sm font-semibold text-white">Fábrica de Software</span>
      <span class="text-xs text-gray-300">Gestão de Projetos</span>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto px-3 py-4 space-y-4">
    <div>
      <h4
        *ngIf="!collapsed"
        class="text-xs uppercase tracking-wider text-gray-400 font-medium mb-2 px-2"
      >
        Menu
      </h4>

      <nav class="space-y-1">
        <a
          *ngFor="let item of currentItems"
          [routerLink]="item.url"
          routerLinkActive="bg-blue-600 text-white font-medium"
          [routerLinkActiveOptions]="{ exact: item.url === '/dashboard' }"
          class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-gray-300 transition-all duration-200 ease-in-out hover:bg-blue-500 hover:text-white group"
          [title]="collapsed ? item.title : ''"
        >
          <lucide-icon
            [img]="item.icon"
            class="h-4 w-4 shrink-0 transition-colors duration-200 ease-in-out group-hover:text-white"
          >
          </lucide-icon>

          <span *ngIf="!collapsed" class="truncate transition-colors duration-200">
            {{ item.title }}
          </span>
        </a>
      </nav>
    </div>
  </div>

  <div class="p-3 border-t border-[#1a3a60] mt-auto">
    <button
      (click)="handleLogout()"
      class="flex items-center w-full gap-3 rounded-lg px-3 py-2.5 text-sm text-gray-400 transition-all duration-200 ease-in-out hover:bg-red-500/20 hover:text-red-400 group"
      [title]="collapsed ? 'Sair' : ''"
    >
      <lucide-icon
        [img]="LogOut"
        class="h-4 w-4 shrink-0 transition-colors duration-200 group-hover:text-red-400"
      >
      </lucide-icon>

      <span *ngIf="!collapsed" class="transition-colors duration-200"> Sair </span>
    </button>
  </div>
</aside>
